<!DOCTYPE html>
<html>

<head>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
</head>

<body>
    <script>
        const EcommerceDB = (() => {
            let t = null;
            function n() {
                return (
                    t ||
                    ((t = new Dexie("FusionERP_Ecommerce_Test")),
                        t
                            .version(1)
                            .stores({
                                articoli: "++id, nome, categoria, disponibile, importatoIl",
                                statiOrdini: "ordineId, stato, aggiornatoIl",
                                metadati: "chiave",
                            }),
                        t)
                );
            }
            return {
                bulkSaveArticoli: async function (t) {
                    const db = n(),
                        now = new Date().toISOString(),
                        existing = await db.articoli.toArray(),
                        nameMap = new Map();
                    existing.forEach((item) => {
                        if (item.nome) nameMap.set(item.nome.trim().toLowerCase(), item);
                    });
                    const toAdd = [],
                        toUpdate = [];
                    t.forEach((item) => {
                        const itemKey = item.nome ? item.nome.trim().toLowerCase() : "";
                        if (itemKey && nameMap.has(itemKey)) {
                            const matched = nameMap.get(itemKey);
                            toUpdate.push({ ...matched, ...item, id: matched.id, modificatoIl: now });
                        } else {
                            toAdd.push({ ...item, importatoIl: now, modificatoIl: now });
                        }
                    });
                    if (toAdd.length > 0) await db.articoli.bulkAdd(toAdd);
                    if (toUpdate.length > 0) await db.articoli.bulkPut(toUpdate);
                    return true;
                },
                getAll: () => n().articoli.toArray()
            }
        })();

        (async () => {
            // Clear DB
            await new Dexie("FusionERP_Ecommerce_Test").delete();

            let articles = [
                { nome: "A", prezzo: 10 },
                { nome: "B", prezzo: 10 },
                { nome: "A", prezzo: 10 } // Intentionally pass a duplicate in the input array!
            ];

            await EcommerceDB.bulkSaveArticoli(articles);
            let num = (await EcommerceDB.getAll()).length;
            console.log("Count after duplicate in input array:", num);

            // Test calling it twice (concurrently)
            await new Dexie("FusionERP_Ecommerce_Test").delete();
            articles = [
                { nome: "A", prezzo: 10 },
                { nome: "B", prezzo: 10 }
            ];
            // Don't await the first one!
            EcommerceDB.bulkSaveArticoli(articles);
            EcommerceDB.bulkSaveArticoli(articles);

            // Wait a bit
            setTimeout(async () => {
                let num2 = (await EcommerceDB.getAll()).length;
                console.log("Count after concurrent save:", num2);
                document.body.innerHTML = `Tests done. Dupes in input: ${num}. Concurrent: ${num2}`;
            }, 1000);
        })();
    </script>
</body>

</html>
