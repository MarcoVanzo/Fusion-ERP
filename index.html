<!DOCTYPE html>
<html lang="it" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="description"
        content="Fusion ERP — Sistema di gestione sportiva per atleti, trasferte e amministrazione.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="app-version" content="1773335775">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fusion ERP</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="apple-touch-icon" href="assets/favicon.svg">
    <!-- DNS preconnect per risorse CDN critiche -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://unpkg.com">
    <!-- Fonts: Inter (principale) precaricato, Syne (display), Barlow (heading). JetBrains Mono rimosso (non critico). -->
    <!-- display=optional: niente FOUT — usa i font di sistema durante il caricamento -->
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700;800&family=Syne:wght@600;700&display=optional">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700;800&family=Syne:wght@600;700&display=optional"
        rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700;800&family=Syne:wght@600;700&display=optional"
            rel="stylesheet">
    </noscript>
    <!-- Phosphor Icons: defer evita il blocco del render -->
    <script src="https://unpkg.com/@phosphor-icons/web" defer></script>
    <link rel="stylesheet" href="css/style_v2.css?v=1773335775">
    <link rel="stylesheet" href="css/societa.css?v=1773335775">
    <link rel="stylesheet" href="css/network.css?v=1773335775">
</head>

<body>

    <!-- ─── SKIP NAVIGATION (LT#3 WCAG 2.4.1) ──────────────────────────────── -->
    <a href="#app" class="skip-nav">Vai al contenuto principale</a>

    <!-- Splash Screen removed as requested -->


    <div id="auth-screen" class="auth-screen">
        <!-- Background Orbs for UI Polish -->
        <div class="auth-bg-orb orb-1"></div>
        <div class="auth-bg-orb orb-2"></div>
        <div class="auth-bg-orb orb-3"></div>

        <div class="auth-panel">
            <div class="auth-logo">
                <img src="uploads/images/Logo Colorato.png" alt="Fusion ERP Logo" class="auth-logo-img">
            </div>

            <div class="login-header">
                <h1 class="login-headline">GET GAME<br>READY</h1>
                <p class="login-subtitle">Gestione atleti, trasferte e compliance — tutto in un posto.</p>
            </div>

            <form id="login-form" class="login-form" novalidate>
                <div class="form-group-login">
                    <label for="login-email">Indirizzo email</label>
                    <div class="input-wrapper">
                        <i class="ph ph-envelope"></i>
                        <input type="email" name="username" id="login-email" required
                            placeholder="nome@fusionteamvolley.it" inputmode="email" autocomplete="username">
                    </div>
                    <p id="login-email-hint" class="form-hint"></p>
                </div>

                <div class="form-group-login">
                    <div class="label-row">
                        <label for="login-password">Password</label>
                        <a href="#" onclick="App.renderForgotPassword && App.renderForgotPassword(); return false;"
                            class="forgot-link">Password dimenticata?</a>
                    </div>
                    <div class="input-wrapper">
                        <i class="ph ph-lock"></i>
                        <input type="password" name="password" id="login-password" required
                            placeholder="Inserisci la password" autocomplete="current-password">
                        <button type="button" class="password-toggle-btn" id="password-toggle"
                            aria-label="Mostra/nascondi password">
                            <i class="ph ph-eye-slash" id="password-toggle-icon"></i> <span
                                id="password-toggle-text">Mostra</span>
                        </button>
                    </div>
                </div>

                <p id="login-error" class="login-error hidden"></p>

                <button type="submit" class="btn btn-primary btn-login" id="login-submit-btn">
                    ACCEDI <i class="ph ph-caret-right"></i>
                </button>


            </form>
        </div>
        <div class="auth-hero" aria-hidden="true">
            <!-- Background image applied via CSS -->
            <div class="hero-logo-container">
                <img src="uploads/images/Logo Colorato.png" alt="Fusion ERP Logo" class="hero-logo-img">
            </div>
        </div>
    </div>

    <!-- ─── PASSWORD RESET SCREEN ───────────────────────────────────────────── -->
    <div id="reset-screen" class="auth-screen hidden">
        <div class="auth-panel">
            <div class="auth-logo">
                <img src="uploads/images/Logo Colorato.png" alt="Fusion ERP Logo" class="auth-logo-img">
            </div>
            <div>
                <h2 style="font-size:1.8rem;">Nuova Password</h2>
                <p class="text-muted"
                    style="font-size:13px;margin-top:4px;font-family:var(--font-body);text-transform:none;letter-spacing:0;">
                    La password è scaduta (90 giorni). Impostarne una nuova.</p>
            </div>
            <form id="reset-form" novalidate style="display:flex;flex-direction:column;gap:var(--sp-2);">
                <div class="form-group">
                    <label class="form-label" for="reset-current">Password Attuale</label>
                    <input id="reset-current" class="form-input" type="password" autocomplete="current-password"
                        required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="reset-new">Nuova Password (min. 12 caratteri, una maiuscola, un
                        simbolo)</label>
                    <input id="reset-new" class="form-input" type="password" autocomplete="new-password" required>
                </div>
                <div id="reset-error" class="form-error hidden" aria-live="polite"></div>
                <button class="btn btn-primary w-full" type="submit" id="reset-btn">SALVA NUOVA PASSWORD</button>
            </form>
        </div>
        <div class="auth-hero" aria-hidden="true">
            <div class="hero-logo-container">
                <img src="uploads/images/Logo Colorato.png" alt="Fusion ERP Logo" class="hero-logo-img">
            </div>
            <div class="auth-hero-text">SICUREZZA</div>
        </div>
    </div>

    <!-- ─── APP SHELL (Sidebar + Main Area) ────────────────────────────── -->
    <div id="app-shell" class="app-shell hidden">

        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-area" data-route="dashboard">
                    <div class="logo-box">
                        <img src="uploads/images/Logo Colorato.png" alt="Fusion Logo" class="sidebar-logo">
                    </div>
                    <span class="app-name">FusionERP</span>
                </div>
                <button type="button" class="toggle-btn" id="sidebarToggle" aria-label="Comprimi navigazione (Ctrl+B)"
                    aria-expanded="true">
                    <i class="ph ph-caret-left" aria-hidden="true"></i>
                </button>
            </div>

            <nav class="sidebar-nav" id="sidebar-nav-container">
                <!-- Navigation items injected dynamically by app.js -->
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile" id="user-menu-btn">
                    <div class="user-avatar" id="sidebar-avatar">U</div>
                    <div class="user-meta">
                        <div class="user-name" id="sidebar-username">Caricamento...</div>
                        <div class="user-role" id="sidebar-role">—</div>
                    </div>
                </div>
            </div>
        </aside>

        <div class="main-wrapper">
            <!-- Topbar (Title, Search, Notifications) -->
            <header class="topbar">
                <div class="topbar-left">
                    <div class="page-title-box">
                        <h1 id="page-title">Dashboard</h1>
                        <p id="page-subtitle">Bentornato nel sistema.</p>
                    </div>
                </div>

                <div class="topbar-right">
                    <div class="search-box" style="position:relative;">
                        <i class="ph ph-magnifying-glass"></i>
                        <input type="text" id="global-search" name="global-search" aria-label="Cerca atleta, sezione..."
                            aria-autocomplete="list" aria-controls="global-search-results" aria-expanded="false"
                            placeholder="Cerca atleta... (⌘K)" autocomplete="off" role="combobox">
                        <div id="global-search-results" class="global-search-results hidden" role="listbox"
                            aria-label="Risultati ricerca"></div>
                    </div>

                    <div class="topbar-actions">
                        <div class="icon-btn" id="notifications-btn" title="Notifiche">
                            <i class="ph ph-bell"></i>
                            <div class="notification-dot" id="notifications-badge"></div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Content Area -->
            <main class="main-content" id="main-content">
                <div id="app" role="main" aria-live="polite">
                    <!-- Module views injected here -->
                </div>
            </main>
        </div>

        <!-- ─── BOTTOM NAV (mobile <768px) (LT#2) ──────────────────────────── -->
        <nav class="bottom-nav" id="bottom-nav" aria-label="Navigazione principale mobile" role="navigation">
            <div class="bottom-nav-inner">
                <button class="bottom-nav-item" data-route="dashboard" type="button" aria-label="Dashboard">
                    <i class="ph ph-squares-four" aria-hidden="true"></i>
                    <span class="bottom-nav-label">Home</span>
                </button>
                <button class="bottom-nav-item" data-route="athletes" type="button" aria-label="Atleti">
                    <i class="ph ph-users" aria-hidden="true"></i>
                    <span class="bottom-nav-label">Atleti</span>
                </button>
                <button class="bottom-nav-item" data-route="tasks" type="button" aria-label="Scadenze">
                    <i class="ph ph-calendar-check" aria-hidden="true"></i>
                    <span class="bottom-nav-label">Scadenze</span>
                </button>
                <button class="bottom-nav-item" data-route="profile" type="button" aria-label="Profilo">
                    <i class="ph ph-user-circle" aria-hidden="true"></i>
                    <span class="bottom-nav-label">Profilo</span>
                </button>
            </div>
        </nav>

        <div id="user-dropdown" class="dropdown-menu hidden">
            <button class="dropdown-item" id="profile-btn" type="button">
                <i class="ph ph-user"></i> Il mio profilo
            </button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" id="logout-btn" type="button">
                <i class="ph ph-sign-out"></i> Esci
            </button>
        </div>
    </div>

    <!-- ─── TOAST CONTAINER ──────────────────────────────────────────────────── -->
    <div id="toast-container" aria-live="assertive" aria-atomic="true" role="status"></div>

    <!-- ─── MODAL CONTAINER ──────────────────────────────────────────────────── -->
    <div id="modal-container"></div>

    <!-- ─── GOOGLE MAPS API (loaded lazily by transport module) ──────────────── -->
    <!-- Will be injected by js/modules/transport.js when needed -->

    <!-- ─── SCRIPTS ──────────────────────────────────────────────────────────── -->
    <!-- ─── CONFIG ───────────────────────────────────────────────────────────── -->
    <!-- PERF: defer elimina il blocco del render — i moduli vengono eseguiti dopo il parsing HTML -->
    <script>window.GOOGLE_MAPS_API_KEY = 'AIzaSyBhPUVEj5X5jZ2zsG1pzDys5QiYHbtN6oI';</script>
    <script src="js/core/utils.js?v=1773335775" defer></script>
    <script src="js/core/store.js?v=1773335775" defer></script>
    <script src="js/core/router.js?v=1773335775" defer></script>
    <script src="js/core/onboarding.js?v=1773335775" defer></script>
    <!-- Dexie.js — IndexedDB wrapper (usato dal modulo eCommerce per storage offline) -->
    <script src="https://unpkg.com/dexie@3/dist/dexie.min.js" defer></script>
    <script src="js/modules/ecommerce-db.js?v=1773335775" defer></script>
    <script src="js/modules/staff_v2.js?v=1773335775" defer></script>
    <script src="js/modules/website.js?v=1773335775" defer></script>
    <script src="js/modules/societa.js?v=1773335775" defer></script>
    <script src="js/modules/network.js?v=1773335775" defer></script>
    <script src="js/modules/squadre.js?v=1773335775" defer></script>
    <script src="js/app.js?v=1773335775" defer></script>

</body>

</html>
