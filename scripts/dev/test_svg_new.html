<!DOCTYPE html>
<html lang="en">
<head>
<style>

  svg {
      width: 100%;
      height: 100%;
      mix-blend-mode: screen;
  }
  .muscle-region {
      transition: all 0.3s ease;
  }
</style>
</head>
