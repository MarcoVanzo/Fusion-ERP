name: 🚀 Deploy to Production (Aruba FTP)

# Triggered on every push to the main branch.
# Credentials are stored as GitHub Repository Secrets — never in code.
on:
  push:
    branches:
      - main
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the cache diff is accurate

      # ── 2. Set up PHP + Composer ────────────────────────────────────────────
      # vendor/ is in .gitignore and never committed.
      # We build it here on the runner so deploy.py can upload it via FTP.
      # The vendor/ cache is keyed on composer.lock so Composer only runs
      # when dependencies actually change (saves ~1-2 min per run).
      - name: 🐘 Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: 💾 Cache vendor/ directory
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-${{ hashFiles('composer.lock') }}
          restore-keys: vendor-

      - name: 📦 Install all Composer dependencies (with dev)
        run: composer update --optimize-autoloader --no-interaction

      - name: 🔍 Run PHPStan analysis
        run: composer phpstan

      - name: 🧪 Run PHPUnit tests
        run: composer test

      - name: 🧹 Prepare production vendor (no dev)
        run: composer update --no-dev --optimize-autoloader --no-interaction

      # ── 3. Set up Python ───────────────────────────────────────────────────
      - name: 🐍 Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
        
      # ── 3. Cache deploy state between runs ────────────────────────────────
      # The deploy.py script stores MD5 hashes of uploaded files in
      # .deploy_cache.json. We cache this file so only changed files
      # are re-uploaded each run (identical to running locally).
      - name: 💾 Restore deploy cache
        uses: actions/cache@v4
        with:
          path: .deploy_cache.json
          key: deploy-cache-${{ github.ref_name }}
          restore-keys: |
            deploy-cache-

      # ── 4. Create .env from GitHub Secrets ────────────────────────────────
      # The .env file is never committed. On the runner we reconstruct it
      # from GitHub Repository Secrets set in Settings → Secrets → Actions.
      - name: 🔐 Construct .env from secrets
        run: |
          cat > .env << 'EOF'
          # FTP — set these in GitHub Secrets
          FTP_HOST=${{ secrets.FTP_HOST }}
          FTP_USER=${{ secrets.FTP_USER }}
          FTP_PASS=${{ secrets.FTP_PASS }}
          FTP_DIR=${{ secrets.FTP_DIR }}

          # Application
          APP_ENV=production
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}
          APP_SECRET=${{ secrets.APP_SECRET }}
          DEFAULT_TENANT_ID=${{ secrets.DEFAULT_TENANT_ID }}

          # Database
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}

          # AI / Maps
          GEMINI_TOKEN=${{ secrets.GEMINI_API_KEY }}
          GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}

          # GAS Proxy (FIPAV scraping)
          GAS_PROXY_URL=${{ secrets.GAS_PROXY_URL }}

          # SMTP
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_ENCRYPTION=${{ secrets.SMTP_ENCRYPTION }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM_NAME="Fusion ERP"

          # Session / Security
          SESSION_NAME=fusion_session
          RATE_LIMIT_MAX=10
          RATE_LIMIT_WINDOW=300
          TRUSTED_PROXY=cloudflare
          IMPORT_SECRET=${{ secrets.IMPORT_SECRET }}

          # Password Policy
          PASSWORD_MIN_LENGTH=12
          PASSWORD_HISTORY_LIMIT=5
          PASSWORD_EXPIRY_DAYS=90

          # Storage paths — Aruba shared hosting (relative to document root)
          PDF_STORAGE_PATH=../storage/pdfs/
          UPLOAD_STORAGE_PATH=../storage/uploads/
          BACKUP_STORAGE_PATH=../storage/backups/
          MILEAGE_RATE=0.25

          # Cognito Forms
          COGNITO_API_KEY=${{ secrets.COGNITO_API_KEY }}
          COGNITO_FORM_ID=${{ secrets.COGNITO_FORM_ID }}
          COGNITO_VIEW_ID=${{ secrets.COGNITO_VIEW_ID }}
          OUTSEASON_SEASON_KEY=${{ secrets.OUTSEASON_SEASON_KEY }}
          OUTSEASON_PRICE_FULL=${{ secrets.OUTSEASON_PRICE_FULL }}
          OUTSEASON_PRICE_PARTIAL=${{ secrets.OUTSEASON_PRICE_PARTIAL }}

          # eCommerce Cognito
          ECOMMERCE_COGNITO_API_KEY=${{ secrets.ECOMMERCE_COGNITO_API_KEY }}
          ECOMMERCE_FORM_ID=${{ secrets.ECOMMERCE_FORM_ID }}

          # Scouting — Fusion
          SCOUTING_FUSION_FORM_ID=${{ secrets.SCOUTING_FUSION_FORM_ID }}
          SCOUTING_FUSION_VIEW_ID=${{ secrets.SCOUTING_FUSION_VIEW_ID }}
          SCOUTING_FUSION_API_KEY=${{ secrets.SCOUTING_FUSION_API_KEY }}

          # Scouting — Network
          SCOUTING_NETWORK_FORM_ID=${{ secrets.SCOUTING_NETWORK_FORM_ID }}
          SCOUTING_NETWORK_VIEW_ID=${{ secrets.SCOUTING_NETWORK_VIEW_ID }}
          SCOUTING_NETWORK_API_KEY=${{ secrets.SCOUTING_NETWORK_API_KEY }}

          # Meta / Social
          META_APP_ID=${{ secrets.META_APP_ID }}
          META_APP_SECRET=${{ secrets.META_APP_SECRET }}
          META_REDIRECT_URI=${{ secrets.META_REDIRECT_URI }}
          META_CONFIG_ID=${{ secrets.META_CONFIG_ID }}

          # Google Drive backup
          GDRIVE_FOLDER_ID=${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_CLIENT_ID=${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET=${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN=${{ secrets.GDRIVE_REFRESH_TOKEN }}

          # WhatsApp Cloud API
          WHATSAPP_TOKEN=${{ secrets.WHATSAPP_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID=${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_BUSINESS_ACCOUNT_ID=${{ secrets.WHATSAPP_BUSINESS_ACCOUNT_ID }}

          # MailerLite
          MAILERLITE_API_KEY=${{ secrets.MAILERLITE_API_KEY }}

          # VALD
          VALD_CLIENT_ID=${{ secrets.VALD_CLIENT_ID }}
          VALD_CLIENT_SECRET=${{ secrets.VALD_CLIENT_SECRET }}
          VALD_USER_EMAIL=${{ secrets.VALD_USER_EMAIL }}
          VALD_ORG_ID=${{ secrets.VALD_ORG_ID }}

          # Stripe Payments
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY=${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}

          # Migrations
          MIGRATION_TOKEN=${{ secrets.MIGRATION_TOKEN }}
          EOF

      # ── 5. Create .env.prod (deployed as .env on the server) ─────────────
      # deploy.py uploads .env.prod → remote .env, so we need this file.
      - name: 📄 Create .env.prod for server deployment
        run: cp .env .env.prod

      # ── 6. Run the existing deploy.py ─────────────────────────────────────
      - name: 🚀 Run deploy.py (FTP incremental upload)
        run: python deploy.py --skip-checks --no-git

      # ── 7. Persist the updated deploy cache ───────────────────────────────
      # This is already handled by actions/cache (post-step save),
      # but we make the new .deploy_cache.json available for the next run.
      - name: ✅ Deploy complete
        run: echo "Deployment finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
