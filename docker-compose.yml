# ═══════════════════════════════════════════════════════════════════
# Fusion ERP — Docker Compose (Development & Production)
# ═══════════════════════════════════════════════════════════════════

services:
  # ─── Application ────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-fusion_erp}
      - DB_USER=${DB_USER:-fusion}
      - DB_PASS=${DB_PASS:-changeme}
      - APP_ENV=${APP_ENV:-production}
      - SESSION_NAME=fusion_session
    volumes:
      - uploads:/var/www/html/uploads
      - sessions:/var/www/html/sessions
      - ./logs:/var/www/html/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fusion-net

  # ─── Database ───────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootsecret}
      - MYSQL_DATABASE=${DB_NAME:-fusion_erp}
      - MYSQL_USER=${DB_USER:-fusion}
      - MYSQL_PASSWORD=${DB_PASS:-changeme}
    volumes:
      - db-data:/var/lib/mysql
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fusion-net

  # ─── Backup (daily automated) ──────────────────────────────────
  backup:
    image: mariadb:10.11
    environment:
      - MYSQL_HOST=db
      - MYSQL_DATABASE=${DB_NAME:-fusion_erp}
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - backups:/backups
    entrypoint: /bin/sh
    command: >
      -c 'while true; do
        sleep 86400;
        mariadb-dump -h db -u root -p$$MYSQL_PASSWORD $$MYSQL_DATABASE | gzip > /backups/fusion_$$(date +%Y%m%d_%H%M%S).sql.gz;
        find /backups -name "*.sql.gz" -mtime +30 -delete;
        echo "[Backup] Completed at $$(date)";
      done'
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fusion-net

volumes:
  db-data:
  uploads:
  sessions:
  backups:

networks:
  fusion-net:
    driver: bridge
